<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ÜÇGEN TJK</title></head>
<body style="margin:0;background:#070714;color:#e2e8f0;font-family:monospace">
<div style="max-width:480px;margin:0 auto;padding:16px">
<div style="text-align:center;padding:20px 0">
<div style="font-size:40px">🐎</div>
<div style="font-size:24px;font-weight:900;color:#f59e0b;letter-spacing:4px">ÜÇGEN</div>
<div style="font-size:10px;color:#374151;letter-spacing:2px">TJK ANALİZ MOTORU</div>
</div>

<div id="tabs" style="display:flex;gap:6px;margin-bottom:14px">
<button onclick="sekmeAc('otomatik')" id="tab-otomatik" style="flex:1;padding:8px;border:none;border-radius:8px;cursor:pointer;font-weight:700;font-size:11px;background:#f59e0b;color:#000">⚡ OTOMATİK</button>
<button onclick="sekmeAc('metin')" id="tab-metin" style="flex:1;padding:8px;border:none;border-radius:8px;cursor:pointer;font-weight:700;font-size:11px;background:#111128;color:#6b7280">📋 METİN YAPIŞTIR</button>
</div>

<div id="panel-otomatik">
<div style="background:#0d0d1a;border:1px solid #1a1a30;border-radius:12px;padding:16px;margin-bottom:12px">
<div style="color:#4b5563;font-size:11px;margin-bottom:8px">📍 ŞEHİR</div>
<div id="sehirler" style="display:flex;gap:6px;flex-wrap:wrap"></div>
</div>
<div style="background:#0d0d1a;border:1px solid #1a1a30;border-radius:12px;padding:16px;margin-bottom:12px">
<div style="color:#4b5563;font-size:11px;margin-bottom:6px">📅 TARİH</div>
<input type="date" id="tarih" style="width:100%;background:#111128;border:1px solid #1a1a35;border-radius:8px;color:#e2e8f0;padding:8px;font-size:13px;outline:none;box-sizing:border-box;color-scheme:dark">
<div style="color:#4b5563;font-size:11px;margin:10px 0 6px">🏁 KOŞU NO</div>
<div id="kosular" style="display:flex;gap:4px"></div>
</div>
<button onclick="otomatikAnaliz()" id="btn-oto" style="width:100%;padding:14px;background:linear-gradient(135deg,#f59e0b,#d97706);border:none;border-radius:12px;color:#000;font-weight:900;font-size:14px;cursor:pointer;letter-spacing:2px;margin-bottom:12px">⚡ ANALİZ ET</button>
</div>

<div id="panel-metin" style="display:none">
<div style="background:#0d1a2e;border:1px solid #1e4a7f;border-radius:12px;padding:14px;margin-bottom:12px">
<div style="color:#60a5fa;font-size:11px;font-weight:700;margin-bottom:8px">📱 NASIL KULLANILIR?</div>
<div style="color:#94a3b8;font-size:11px;line-height:1.6">1. TJK.org veya misli.com'u aç<br>2. Koşu sayfasındaki metni seç ve kopyala<br>3. Aşağıya yapıştır<br>4. ANALİZ ET'e bas</div>
</div>
<textarea id="metin-input" placeholder="TJK veya misli.com'dan kopyaladığın koşu metnini buraya yapıştır..." rows="10" style="width:100%;background:#0d0d1a;border:1px solid #1a1a30;border-radius:12px;color:#e2e8f0;padding:12px;font-size:12px;font-family:monospace;outline:none;box-sizing:border-box;resize:vertical;margin-bottom:12px"></textarea>
<button onclick="metinAnaliz()" id="btn-metin" style="width:100%;padding:14px;background:linear-gradient(135deg,#f59e0b,#d97706);border:none;border-radius:12px;color:#000;font-weight:900;font-size:14px;cursor:pointer;letter-spacing:2px;margin-bottom:12px">⚡ METİNDEN ANALİZ ET</button>
</div>

<div id="sonuc" style="margin-top:8px"></div>
</div>

<script>
const SEHIRLER=["İzmir","İstanbul","Ankara","Antalya","Bursa","Adana","Şanlıurfa","Elazığ","Kocaeli"];
let sehir="İzmir",kosuNo=1;
const bugun=new Date().toISOString().split("T")[0];
document.getElementById("tarih").value=bugun;

const sd=document.getElementById("sehirler");
SEHIRLER.forEach(s=>{const b=document.createElement("button");b.textContent=s;b.onclick=()=>{sehir=s;renderSehir();};b.style.cssText="padding:5px 10px;border-radius:20px;border:none;cursor:pointer;font-size:10px;font-weight:700;transition:all 0.15s;font-family:monospace";sd.appendChild(b);});

const kd=document.getElementById("kosular");
for(let i=1;i<=10;i++){const b=document.createElement("button");b.textContent=i;b.onclick=()=>{kosuNo=i;renderKosu();};b.style.cssText="flex:1;padding:7px 0;border-radius:6px;border:none;cursor:pointer;font-size:11px;font-weight:700;font-family:monospace";kd.appendChild(b);}

function renderSehir(){document.querySelectorAll("#sehirler button").forEach((b,i)=>{b.style.background=SEHIRLER[i]===sehir?"#f59e0b":"#111128";b.style.color=SEHIRLER[i]===sehir?"#000":"#6b7280";});}
function renderKosu(){document.querySelectorAll("#kosular button").forEach((b,i)=>{b.style.background=(i+1)===kosuNo?"#f59e0b":"#111128";b.style.color=(i+1)===kosuNo?"#000":"#6b7280";});}
renderSehir();renderKosu();

function sekmeAc(s){
  document.getElementById("panel-otomatik").style.display=s==="otomatik"?"block":"none";
  document.getElementById("panel-metin").style.display=s==="metin"?"block":"none";
  document.getElementById("tab-otomatik").style.background=s==="otomatik"?"#f59e0b":"#111128";
  document.getElementById("tab-otomatik").style.color=s==="otomatik"?"#000":"#6b7280";
  document.getElementById("tab-metin").style.background=s==="metin"?"#f59e0b":"#111128";
  document.getElementById("tab-metin").style.color=s==="metin"?"#000":"#6b7280";
}

function btnYukle(id){const b=document.getElementById(id);b.textContent="⏳ ANALİZ EDİLİYOR...";b.disabled=true;b.style.background="#111128";b.style.color="#374151";}
function btnBitir(id){const b=document.getElementById(id);b.textContent="⚡ ANALİZ ET";b.disabled=false;b.style.background="linear-gradient(135deg,#f59e0b,#d97706)";b.style.color="#000";}

function sonucGoster(d){
  const atlar=d.veri.atlar;
  const maxS=Math.max(...atlar.map(a=>a.siklet||0));
  const puanli=atlar.map(at=>{
    const kgs=at.kgs||30,agf=at.agf||10,s=at.siklet||0;
    const fp=Math.min(30,Math.round(((at.sonYarislar||[]).slice(0,6).reduce((a,y)=>a+({1:6,2:4,3:2,4:1}[parseInt(y)]||0),0)/36)*30));
    const sp=Math.max(0,Math.round(20-(maxS-s)*1.8));
    const kp=kgs>=14&&kgs<=28?15:kgs>=7&&kgs<=13?10:8;
    const ap=agf>=5&&agf<=12?20:agf>=13?15:agf<=4?10:12;
    const jp=Math.min(15,Math.round((at.jokeyWin||0)*0.3));
    const gp=(kgs>=14&&kgs<=28?4:0)+(agf>=3&&agf<=8?4:0);
    const toplam=Math.min(100,fp+sp+kp+ap+jp+gp);
    return{...at,toplam};
  }).sort((a,b)=>b.toplam-a.toplam);
  const medals=["🥇","🥈","🥉"];
  const colors=["#f59e0b","#94a3b8","#cd7f32"];
  document.getElementById("sonuc").innerHTML=`
<div style="background:linear-gradient(135deg,#1a0f00,#1a1400);border:1px solid #f59e0b30;border-radius:16px;padding:16px;margin-bottom:16px">
<div style="color:#f59e0b;font-size:10px;letter-spacing:3px;font-weight:700;text-align:center;margin-bottom:14px">🔺 ÜÇGEN — 3 KESİN ADAY</div>
${puanli.slice(0,3).map((at,i)=>`
<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:${i<2?"1px solid #1a1a30":"none"}">
<div style="display:flex;align-items:center;gap:10px">
<span style="font-size:22px">${medals[i]}</span>
<div>
<div style="color:#e2e8f0;font-weight:700;font-size:15px">${at.isim}</div>
<div style="color:#6b7280;font-size:10px">🏇 ${at.jokey||"—"} · ⚖️${at.siklet}kg</div>
</div></div>
<div style="text-align:right">
<div style="font-size:22px;font-weight:900;color:${colors[i]}">${at.toplam}</div>
<div style="font-size:9px;color:#4b5563">/100</div>
</div></div>`).join("")}
</div>
<div style="color:#374151;font-size:10px;letter-spacing:2px;margin-bottom:10px">TÜM ATLAR (${puanli.length})</div>
${puanli.map((at,i)=>`
<div style="background:${i<3?"linear-gradient(135deg,#0f0f23,#1a1a35)":"#0a0a18"};border:1px solid ${i<3?colors[i]+"50":"#1a1a30"};border-radius:10px;padding:12px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center">
<div>
<span style="color:${i<3?"#e2e8f0":"#9ca3af"};font-weight:700">${i+1}. ${at.isim}</span>
<div style="color:#6b7280;font-size:10px;margin-top:2px">⚖️${at.siklet}kg · KGS:${at.kgs}g · AGF:${at.agf}.</div>
</div>
<div style="font-size:18px;font-weight:900;color:${i<3?colors[i]:"#374151"}">${at.toplam}</div>
</div>`).join("")}
<div style="color:#374151;font-size:10px;text-align:center;margin-top:8px">📡 ${d.kaynak}</div>`;
}

async function otomatikAnaliz(){
  btnYukle("btn-oto");
  const tarih=document.getElementById("tarih").value;
  try{
    const r=await fetch("/veri",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({sehir,tarih,kosuNo})});
    const d=await r.json();
    if(!r.ok)throw new Error(d.detail?.mesaj||"Veri alınamadı");
    sonucGoster(d);
  }catch(e){document.getElementById("sonuc").innerHTML=`<div style="background:#1a0000;border:1px solid #7f1d1d;border-radius:10px;padding:14px;color:#ef4444">⚠️ ${e.message}</div>`;}
  btnBitir("btn-oto");
}

async function metinAnaliz(){
  btnYukle("btn-metin");
  const metin=document.getElementById("metin-input").value;
  if(!metin.trim()){document.getElementById("sonuc").innerHTML=`<div style="background:#1a0000;border:1px solid #7f1d1d;border-radius:10px;padding:14px;color:#ef4444">⚠️ Lütfen metin girin</div>`;btnBitir("btn-metin");return;}
  try{
    const r=await fetch("/metin",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({metin,sehir,tarih:document.getElementById("tarih").value,kosuNo})});
    const d=await r.json();
    if(!r.ok)throw new Error(d.detail?.mesaj||"Veri alınamadı");
    sonucGoster(d);
  }catch(e){document.getElementById("sonuc").innerHTML=`<div style="background:#1a0000;border:1px solid #7f1d1d;border-radius:10px;padding:14px;color:#ef4444">⚠️ ${e.message}</div>`;}
  btnBitir("btn-metin");
}
</script></body></html>
